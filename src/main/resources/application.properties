spring.application.name=climalert

# ============================================================
# WeatherAPI (https://www.weatherapi.com)
# Crear una cuenta gratuita y pegar la API key abajo.
# ============================================================
climalert.weather-api.base-url=https://api.weatherapi.com/v1
climalert.weather-api.key=Pega aca
climalert.weather-api.location=Buenos Aires

# ============================================================
# Umbrales de alerta (enunciado: temp > 35 C y humedad > 60%)
# TIP para probar el envio de mails: cambiar temporalmente
# temperature-threshold=-50 y humidity-threshold=-1,
# reiniciar la app, y despues volver a 35 y 60.
# ============================================================
climalert.alert.temperature-threshold=35
climalert.alert.humidity-threshold=60

# ============================================================
# Correo de alertas (destinatarios definidos por el enunciado)
# ============================================================
climalert.mail.from=alertas@climalert.com
climalert.mail.recipients=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# ============================================================
# Servidor SMTP de prueba (Mailtrap sandbox - https://mailtrap.io)
# Pegar el usuario y password de tu inbox de prueba.
# ============================================================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=Pega aca
spring.mail.password=Pega aca
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Base de datos H2 en modo archivo (se crea ./data/climalert.mv.db)
# Consola web para ver el historico: http://localhost:8080/h2-console
#   JDBC URL: jdbc:h2:file:./data/climalert
#   Usuario:  sa      Password: (dejar vacio)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/climalert;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
